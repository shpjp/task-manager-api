services:
  postgres:
    image: postgres:17

    container_name: task-manager-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmanager

    # Host port 5433 avoids colliding with a locally installed Postgres on 5432
    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmanager"]
      interval: 5s
      timeout: 3s
      retries: 10

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: