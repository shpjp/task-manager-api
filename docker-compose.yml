services:
  postgres:
    image: postgres:17
    container_name: task-manager-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmanager
    # Host port 5433 avoids colliding with a locally installed Postgres on 5432
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskmanager"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: task-manager-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: taskmanager
      APP_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      TOKEN_TTL_HOURS: 24
      FRONTEND_ORIGIN: http://localhost:3000
      COOKIE_SECURE: "false"
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@example.com}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_FOLDER: tasktheteam
      MAX_UPLOAD_MB: 5
    ports:
      - "8080:8080"

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: task-manager-web
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
